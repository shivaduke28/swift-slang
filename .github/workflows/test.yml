name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme SwiftSlang-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation
